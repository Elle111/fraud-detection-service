spring:
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password: 
    
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    
  kafka:
    bootstrap-servers: ${spring.embedded.kafka.brokers:localhost:9092}
    
app:
  kafka:
    topics:
      transaction-created: transaction.created.test
      fraud-decision: fraud.decision.test
    consumer-group: test-group

fraud:
  rules:
    amount:
      threshold:
        high: 1000.00
        medium: 500.00
    frequency:
      max:
        transactions:
          per:
            hour: 5
            day: 20
